<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinanCity - Home</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1 id="main">FinanCity - Your Finance Assistance Dashboard</h1>
    </header>
    <div id="netOverview">
      <label id="totalIncomeLabel">Total Income: </label>
      <div
        id="totalIncome"
        contenteditable="false"
      >35000 PKR</div>
      <label id="totalExpensesLabel">Total Expenses: </label>
      <div
        id="totalExpenses"
        contenteditable="false"
      >20000 PKR</div>
      <label id="netBalanceLabel">Net Balance: </label>
      <div
        id="netBalance"
        contenteditable="false"
      >+15000 PKR</div>
    </div>
    <div class="flexContainer">
      <div class="column leftColumn">
        <h2>Add Transaction</h2>
        <form action="" id="newTransactionForm">
          <label for="title">Title:</label>
          <input
            type="text"
            name="title"
            id="transactionTitle"
            placeholder="Salary"
            required
          />
          <label for="amount">Amount:</label>
          <input
            type="number"
            name="amount"
            id="transactionAmount"
            min="0"
            step="0.1"
            placeholder="50000"
            required
          />
          <label for="type">Transaction Type: </label>
          <select name="type" id="transactionType" required>
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>

          <label for="date">Transaction Date:</label>
          <input
            type="date"
            name="date"
            id="transactionDate"
            placeholder="06/02/2026"
            required
          />
          <button type="submit">Add</button>
        </form>

        <div id="backupSection">
          <h3>Backup & Restore</h3>
          <button id="exportJSONBtn">Export JSON Backup</button>
          <label for="importJSONFile" id="importLabel">Import Backup File</label>
          <input type="file" id="importJSONFile" accept=".json" style="display: none;">
        </div>
      </div>
      <div class="column rightColumn">
        <h2>Transactions History</h2>
        <table id="historyTable">
          <thead id="historyHead">
          <tr id="historyTableHeader">
            <th>Date</th>
            <th>Title</th>
            <th>Amount</th>
            <th>Type</th>
            <th>Action</th>
          </tr>
          </thead>
          <tbody id="historyBody">
          </tbody>
        </table>
        <div id="paginationControl"></div>
      </div>
    </div>
    <footer>
      <p class="creditsPara">&copy; 2026 Safeer Hassan. All rights reserved.</p>
      <nav>
        <a href="https://safeerhassan.me/">My Portfolio</a>
        <a href="https://blog.safeerhassan.me/">My Blog</a>
      </nav>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
